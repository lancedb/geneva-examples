name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # Installs the full runtime stack + the dev group. geneva/lancedb/pylance
      # come from the public Gemfury indexes declared in pyproject.toml; if those
      # ever require auth, add UV_INDEX_LANCEDB_PASSWORD / UV_INDEX_LANCE_FORMAT_PASSWORD
      # repo secrets and pass them here as env.
      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check --output-format=github

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Tests + coverage
        run: uv run pytest

      # ty is a preview type checker; report its findings but never fail CI on
      # them (mirrors the non-blocking local pre-commit hook).
      - name: Type check (ty, non-blocking)
        run: uv run ty check geneva_examples
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
